{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'frontend/styles.css' %}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-kanban"></i> Task Manager</span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Teams Column (Sidebar) -->
            <div class="col-md-3 sidebar">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">Your Teams</h5>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#teamModal">
                        <i class="bi bi-plus-lg"></i> New
                    </button>
                </div>
                <div id="teamsList" class="list-group mb-3">
                    <div class="text-center text-muted py-3">Loading teams...</div>
                </div>
            </div>

            <!-- Tasks Column -->
            <div class="col-md-9">
                <div id="tasksHeader" class="d-flex justify-content-between align-items-center mb-3" style="display:none;">
                    <h4 id="currentTeamName"></h4>
                    <div>
                        <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="clearTaskForm()">
                            <i class="bi bi-plus-lg"></i> Add Task
                        </button>
                        <button class="btn btn-outline-secondary btn-sm ms-2" onclick="openMembersModal()">
                            <i class="bi bi-people"></i> Members
                        </button>
                        <button class="btn btn-outline-info btn-sm ms-2" onclick="openFilesModal()">
                            <i class="bi bi-folder"></i> Files
                        </button>
                    </div>
                </div>
                <div id="tasksList" class="table-responsive">
                    <p class="text-muted">Select a team to view its tasks.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Team Create/Edit Modal -->
    <div class="modal fade" id="teamModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Create Team</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input id="teamName" class="form-control mb-2" placeholder="Team name">
                    <input id="teamDesc" class="form-control" placeholder="Description (optional)">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="createTeam()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Create/Edit Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="taskModalLabel">New Task</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <input id="taskTitle" class="form-control mb-2" placeholder="Title" required>
                    <textarea id="taskDesc" class="form-control mb-2" placeholder="Description" rows="2"></textarea>
                    <div class="row mb-2">
                        <div class="col">
                            <label class="form-label">Status</label>
                            <select id="taskStatus" class="form-select">
                                <option value="todo">To Do</option>
                                <option value="in_progress">In Progress</option>
                                <option value="done">Done</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Priority</label>
                            <select id="taskPriority" class="form-select">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <label class="form-label">Assignee</label>
                    <select id="taskAssignee" class="form-select">
                        <option value="">Unassigned</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="saveTask()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Members Modal -->
    <div class="modal fade" id="membersModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Team Members</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="membersList" class="mb-3">
                        <p class="text-muted">Loading members...</p>
                    </div>
                    <div id="addMemberForm" class="border-top pt-3" style="display:none;">
                        <h6>Add Member</h6>
                        <div class="input-group mb-2">
                            <input type="number" id="newMemberId" class="form-control" placeholder="User ID">
                            <select id="newMemberRole" class="form-select" style="max-width:130px;">
                                <option value="member">Member</option>
                                <option value="admin">Admin</option>
                            </select>
                            <button class="btn btn-primary" onclick="addMember()">Add</button>
                        </div>
                        <small class="text-muted">Enter the numeric user ID of an existing user.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Files Modal -->
    <div class="modal fade" id="filesModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Team Files</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="filesList" class="mb-3">
                        <p class="text-muted">Loading files...</p>
                    </div>
                    <div class="border-top pt-3">
                        <h6>Upload File</h6>
                        <form id="uploadForm" enctype="multipart/form-data">
                            <div class="mb-2">
                                <input type="file" id="fileInput" class="form-control" required>
                            </div>
                            <div class="input-group mb-2">
                                <input type="text" id="fileName" class="form-control" placeholder="Display name (optional)">
                                <input type="text" id="fileDesc" class="form-control" placeholder="Description (optional)">
                                <button type="button" class="btn btn-primary" onclick="uploadFile()">Upload</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{% static 'frontend/dashboard.js' %}?v=1"></script>
</body>
</html>
